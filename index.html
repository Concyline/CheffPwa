    <script>


        $("#progress").on("click", function (e) {

            TopProgressBar.start();

            setTimeout(() => {
                TopProgressBar.finish();
            }, 5000);
        })

        $("#teste").on("click", function (e) {
            login()
        })

        $("#start").on("click", function (e) {
            startSerrionTable()
        })

        async function startSerrionTable() {
            const api = new ApiService()

            try {

                const response = await api.post("/table-sessions/start-qrcode", {
                    qrToken: "11AB7699-034F-4FFB-81DC-874E788ED86E"
                });

                if (!response.Success) {
                    showAlert({ message: response.Message });
                    return;
                }

                showAlert({ message: JSON.stringify(response) });

            } catch (e) {
                showAlert({ message: e.message });
            }
        }



        async function login() {

            const api = new ApiService()

            try {

                const response = await api.post("/user/login", {
                    email: "admin_pimenta_sapeka@system.local",
                    password: "admin"
                });

                console.log(response)
                console.log(response.Timestamp)

                if (!response.Success) {
                    showAlert({ message: response.Message });
                    return;
                }

                const token = response.Data.token;
                const user = response.Data.user;

                TokenManager.set(token);

                console.log("Usuário:", user);
                console.log("Token:", token);

                showAlert({ message: token });

            } catch (e) {
                showAlert({ message: e.message });
            }

        }




        function sendToken() {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {

                showAlert({
                    title: "Excluir item",
                    message: `Token salvo: ${savedToken}`,
                    type: "ok",
                });

            } else {
                showAlert({
                    title: "Excluir item",
                    message: 'Nenhum token salvo no localStorage.',
                    type: "ok",
                });
            }
        }

        document.getElementById('getTokenBtn').addEventListener('click', sendToken);

    </script>
