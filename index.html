<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--Configuração de titulo-->
    <title>Siac App</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- iOS + Android WebApp support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/img/icon-256.png">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json?v=1.12" />
    <meta name="theme-color" content="#0A516D" />

    <!--styles-->
    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/geral.css">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="stylesheet" href="css/top_bar.css">
    <link rel="stylesheet" href="css/menu_lateral.css">



    <style>
        a.botao {
            display: inline-block;
            background-color: #018790;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }

        a.botao:hover {
            background-color: #0A516D;
        }
    </style>
</head>

<body>

    <!-- Barra superior -->
    <div class="topbar">
        <button class="menu-toggle">&#9776;</button>
        <h1 class="menu-title">Siac App</h1>
    </div>

    <!-- Menu lateral -->
    <nav class="menu-lateral">
        <div class="card-usuario">
            <img src="./img/avatar.png" alt="Foto do usuário" class="avatar" />
            <span class="card-usuario-email">siac@gruposiac.com</span>
        </div>

        <ul>
            <li><a href="#" class="menu-home">Início</a></li>

            <li class="has-submenu">
                <a href="#" class="menu-config">Configurações</a>
                <ul class="submenu">
                    <li><a href="#" class="menu-tema">Tema</a></li>
                    <li><a href="#">Perfil</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <!-- Fundo escurecido -->
    <div class="overlay"></div>

    <!-- Loader da pagina -->
    <div id="loader">
        <div class="loader-ring"></div>
    </div>

    <!-- Conteúdo principal -->
    <main>
        <h2>Bem-vindo! Versao 1.1</h2>
        <p>Agora com a paleta personalizada que você escolheu. O menu lateral ainda funciona como slide.</p>

        <a href="#" class="botao">Ação Principal</a>
        <a class="botao" id="btnLoader">Loader</a>
        <a class="botao" id="btnNotifica">Notificação</a>
        <button id="getTokenBtn">Mostrar Token</button>


        <button type="button" onclick="aqui()">soma</button>

    </main>

    <!-- jQuery + interações -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/math.js"></script>
    <script src="./js/gerenteToken.js"></script>

    <script>

        $(document).ready(function () {
            if (localStorage.getItem('theme') === 'dark-mode') {
                //$('body').addClass('dark-mode');
                $('html').addClass('dark-mode');
            }


            // acao quando mudar o tamanho da tela
            $(window).on('resize', function () {

                // quando for tamanho de desktop
                if (window.matchMedia("(min-width: 769px)").matches) {
                    $('.menu-lateral').css('left', '0');
                    $('.overlay').hide();
                } else {
                    $('.menu-lateral').css('left', '-320px');
                }

            });
        });

        $(function () {
            let touchStartX = 0;
            let touchEndX = 0;

            function abrirMenu() {
                $('.menu-lateral').css('left', '0').addClass('aberto');
                $('.overlay').fadeIn();
            }

            function fecharMenu() {
                $('.menu-lateral').css('left', '-320px').removeClass('aberto');
                $('.overlay').fadeOut();
            }

            $('.menu-toggle').click(abrirMenu);
            $('.overlay').click(fecharMenu);

            document.addEventListener('touchstart', function (e) {
                touchStartX = e.changedTouches[0].screenX;
            });

            document.addEventListener('touchend', function (e) {
                touchEndX = e.changedTouches[0].screenX;
                let diffX = touchEndX - touchStartX;

                if (touchStartX < 50 && diffX > 50) {
                    abrirMenu();
                }

                if (touchStartX > 50 && diffX < -50 && $('.overlay').is(':visible')) {
                    fecharMenu();
                }
            });


            $('.menu-config').on('click', function (e) {
                e.preventDefault();
                $(this).closest('.has-submenu').toggleClass('open');
            });

            $('.submenu a').on('click', function (e) {
                e.preventDefault();

                if ($('html').hasClass('dark-mode')) {
                    // 🔄 Se já estiver dark → volta para padrão
                    $('html').removeClass('dark-mode');
                    localStorage.removeItem('theme');
                } else {
                    // 🌙 Se estiver padrão → ativa dark
                    $('html').addClass('dark-mode');
                    localStorage.setItem('theme', 'dark-mode');
                }

                // fecha submenu
                $(this).closest('.has-submenu').removeClass('open');

                if (window.matchMedia("(max-width: 768px)").matches) {
                    fecharMenu();
                }
            });

        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => {
                    console.log('✅ Service Worker registrado:', reg.scope);

                    // Verifica se há uma nova versão do SW sendo instalada
                    reg.onupdatefound = () => {
                        const newWorker = reg.installing;

                        newWorker.onstatechange = () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('⚠️ Nova versão detectada. Recarregando...');
                                window.location.reload(); // Atualiza automaticamente
                            }
                        };
                    };
                })
                .catch(err => {
                    console.log('❌ Erro ao registrar SW:', err);
                });
        }

        $('#btnLoader').on('click', function () {
            console.log('click');

            $('#loader')
                .css('display', 'flex') // força flex antes de animar
                .hide()                 // esconde imediatamente (caso visível)
                .fadeIn(200);           // anima a entrada

            setTimeout(() => {
                $('#loader').fadeOut(300); // Oculta após 5 segundos
            }, 5000); // corrigido: 500000 seria 8 minutos
        });

        document.getElementById('btnNotifica').addEventListener('click', function (e) {
            e.preventDefault(); // Impede navegação

            console.log("clique novo novo")

            mostrarNotificacao('Mensagem acionada por clique');
        });

        function mostrarNotificacao(corpo) {

            // Verifica se o navegador suporta
            if (!('Notification' in window)) {
                alert('Este navegador não suporta notificações.');
                return;
            }

            // Verifica permissão
            if (Notification.permission === 'granted') {

                new Notification('Atenção', {
                    body: corpo,
                    icon: '/img/icon-256.png' // seu ícone
                });
            } else if (Notification.permission !== 'denied') {

                // Pede permissão
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification('Atenção', {
                            body: corpo,
                            icon: '/img/icon-256.png'
                        });
                    }
                });
            }
        }


        function aqui() {
            alert(soma(2, 3))
        }

        function sendToken() {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                alert(`Token salvo: ${savedToken}`);
            } else {
                alert('Nenhum token salvo no localStorage.');
            }
        }

        document.getElementById('getTokenBtn').addEventListener('click', sendToken);

    </script>

</body>

</html>
