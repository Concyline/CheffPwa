        function mostrarNotificacao(corpo) {

            // Verifica se o navegador suporta
            if (!('Notification' in window)) {
                alert('Este navegador não suporta notificações.');
                return;
            }

            // Verifica permissão
            if (Notification.permission === 'granted') {

                new Notification('Atenção', {
                    body: corpo,
                    icon: '/img/icon-256.png' // seu ícone
                });
            } else if (Notification.permission !== 'denied') {

                // Pede permissão
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification('Atenção', {
                            body: corpo,
                            icon: '/img/icon-256.png'
                        });
                    }
                });
            }
        }


        function aqui() {
            alert(soma(2, 3))
        }

        function sendToken() {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                alert(`Token salvo: ${savedToken}`);
            } else {
                alert('Nenhum token salvo no localStorage.');
            }
        }

        document.getElementById('getTokenBtn').addEventListener('click', sendToken);
