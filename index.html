<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--Configuração de titulo-->

    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- iOS + Android WebApp support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/img/icon-256.png">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json?v=1.12" />
    <meta name="theme-color" content="#0A516D" />

    <!--styles-->
    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/geral.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="stylesheet" href="css/top_bar.css">
    <link rel="stylesheet" href="css/menu_lateral.css">



    <style>

    </style>
</head>

<body>

    <!-- Barra superior -->
    <div class="topbar">
        <button class="menu-toggle">&#9776;</button>
        <h1 class="menu-title">Siac App</h1>
    </div>

    <!-- Menu lateral -->
    <nav class="menu-lateral">
        <div class="card-usuario">
            <img src="./img/avatar.png" alt="Foto do usuário" class="avatar" />
            <span class="card-usuario-email">siac@gruposiac.com</span>
        </div>

        <ul>
            <li><a href="#" class="menu-home">Início</a></li>

            <li class="has-submenu">
                <a href="#" class="menu-config">Configurações</a>
                <ul class="submenu">
                    <li><a href="#" class="menu-tema">Tema</a></li>
                    <!-- <li><a href="#">Perfil</a></li> -->
                </ul>
            </li>
        </ul>
    </nav>

    <!-- Fundo escurecido -->
    <div class="overlay"></div>

    <!-- Loader da pagina -->
    <div id="loader">
        <div class="loader-ring"></div>
    </div>



    <!-- Conteúdo principal -->
    <main>
        <h2>Bem-vindo! Versao 1.1</h2>
        <p>Agora com a paleta personalizada que você escolheu. O menu lateral ainda funciona como slide.</p>


        <button class="botao" id="teste">Teste</button>
        <button class="botao" disabled id="teste">Teste</button>

        <button class="botao" id="btnToast">Toast</button>
        <button class="botao" id="btnSnack">SnackBar</button>
        <button class="botao" id="btnSnackCall">SnackBar Call back</button>

        <button class="botao" id="btnAlertOk">Alert ok</button>
        <button class="botao" id="btnAlertSim">Alert sim/cancelar</button>
        <button class="botao" id="btnAlertSimNao">Alert sim/nao/cancelar</button>

        <button class="botao" id="getTokenBtn">Mostrar Token</button>

        <div class="div-input">
            <span class="textview">Entre com o token</span>
            <input type="text" class="input" placeholder="Digite seu token">
        </div>

        <div class="div-input">
            <span class="textview">Entre com o token</span>
            <input type="text" class="input" placeholder="Digite seu token">
        </div>

        <div class="div-input">
            <span class="textview">Entre com o token</span>
            <input type="text" class="input" placeholder="Digite seu token">
        </div>

        <div class="div-input">
            <span class="textview">Entre com o token</span>
            <input type="text" class="input" placeholder="Digite seu token">
        </div>

        <div class="div-input">
            <span class="textview">Entre com o token</span>
            <input type="text" class="input" placeholder="Digite seu token">
        </div>

        <div class="div-input">
            <span class="textview">Entre com o token</span>
            <input type="text" class="input" placeholder="Digite seu token">
        </div>



        <button class="botao" type="button" onclick="aqui()">soma</button>

    </main>

    <!-- jQuery + interações -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="./js/math.js"></script>
    <script src="./js/ready.js"></script>
    <script src="./js/componentes.js"></script>
    <script src="./js/menu_lateral.js"></script>
    <script src="./js/gerenteToken.js"></script>
    <script src="./js/serviceWorker.js"></script>

    <script>

        $('#btnToast').on('click', function (e) {
            showToast("Toast cusomizado como do android!")
        })

        $('#btnSnack').on('click', function (e) {
            showSnackbar("Snack cusomizado como do android!")
        })

        $('#btnSnackCall').on('click', function (e) {
            showSnackbar(
                "Item removido",
                "DESFAZER",
                () => {
                    console.log("Ação desfeita!");
                }
            );
        })

        $('#btnAlertOk').on('click', function (e) {

            showAlert({
                title: "Excluir item",
                message: "Tem certeza?",
                type: "ok",
                okText: "Visto"
            }).then(result => {

                if (result === "ok") {
                    showToast("ok");
                }

            });

        })

        $('#btnAlertSim').on('click', function (e) {

            showAlert({
                title: "Delete",
                message: "Do you want to delete this item?",
                type: "confirm",
                yesText: "Excluir",
                cancelText: "Voltar"
            })
                .then(result => {

                    if (result === "yes") {
                        showToast("yes");
                    }

                });

        })

        $('#btnAlertSimNao').on('click', function (e) {

            showAlert({
                title: "Atenção",
                message: "Seseja fazer o BKP?",
                type: "triple", yesText: "Excluir",
                noText: "Reavaliar",
                cancelText: "Voltar"
            })
                .then(result => {

                    if (result === "yes") {
                        showToast("yes");

                    } else if (result === "no") {
                        showToast("no");
                    }

                });

        })


        function sendToken() {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {

                showAlert({
                    title: "Excluir item",
                    message: `Token salvo: ${savedToken}`,
                    type: "ok",
                });

            } else {
                showAlert({
                    title: "Excluir item",
                    message: 'Nenhum token salvo no localStorage.',
                    type: "ok",
                });
            }
        }

        document.getElementById('getTokenBtn').addEventListener('click', sendToken);

    </script>

</body>

</html>
