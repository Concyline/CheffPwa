<form id="form-usuario">

    <!-- COMPREENDE O RESTANTE DA TELA QUANO O POP UP SE ELEVA -->
    <div id="overlay" class="popup-overlay"></div>

    <!-- POP UP QUE ABRE QUANDO ESTA EM MODO CELULAR -->
    <div id="popup-menu" class="popup-menu">
        <div class="popup-item" id="btn-camera">
            <span class="menu-camera"></span>
            Tirar foto
        </div>
        <div class="popup-item" id="btn-galeria">
            <span class="menu-galery"></span>
            Galeria
        </div>
    </div>

    <!-- IMPUTS DE SERVIÇO PARA ABRIR AS IMAGENS OU TIRAR UMA FOTO -->
    <input type="file" id="file-camera" accept="image/*" capture="environment" style="display:none">
    <input type="file" id="file-galeria" accept="image/*" style="display:none">


    <!-- CAMPO ONDE SERA MOSTRADO A IMAGEM DEPOIS DE RECORTADA -->
    <div class="container-avatar">
        <img id="preview" src="../img/avatar.png">
    </div>


    <input type="hidden" name="avatarbase64" id="avatarbase64">

    <div class="div-input">
        <label class="textview">Nome</label>
        <input type="text" id="nome" name="nome" class="input" required placeholder="Digite seu nome">
    </div>

    <div class="div-input">
        <label class="textview">Email</label>
        <input type="email" id="email" name="email" class="input" required placeholder="Digite seu email">
    </div>

    <div class="div-input">
        <label class="textview">Telefone</label>
        <input type="tel" id="telefone" name="telefone" class="input fone" inputmode="numeric"
            pattern="\([0-9]{2}\)\s?[0-9]{4,5}-[0-9]{4}" maxlength="15" required placeholder="(00) 00000-0000">
    </div>

    <div class="div-input">
        <label class="textview">Senha</label>

        <div class="password-container">
            <input type="password" id="senhaCadastro" name="senha" class="input" minlength="4" required
                placeholder="Digite sua senha" autocomplete="off">

            <span id="toggleCadastro"  class="toggle-password menu-visibility"></span>
        </div>
    </div>

    <div class="div-input" id="div-role">

        <label class="textview">Perfil do usuário</label>

        <select id="role" name="role" class="input">

            <option value="6">Selecione</option> <!--Cliente externo (app/delivery futuro)-->
            <option value="3">Cozina</option>
            <option value="4">Caixa</option>
            <option value="5">Garçom</option>

        </select>

    </div>

</form>


<!-- DIALOG CROP -->
<div id="crop-dialog" class="crop-dialog">

    <div class="crop-container">

        <div class="crop-actions">
            <button id="btn-cancelar-crop">
                <img src="../img/close_24dp_FFFFFF.png">
            </button>
            <button id="btn-cortar">
                <img src="../img/crop_24dp_FFFFFF.png">
            </button>
        </div>

        <img id="image-crop">

    </div>

</div>
