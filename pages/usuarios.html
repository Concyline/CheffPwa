<form id="form-usuario">

    <!-- <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none"> -->

    <input type="file" id="file-camera" accept="image/*" capture="environment" style="display:none">
    <input type="file" id="file-galeria" accept="image/*" style="display:none">

    <img id="preview" width="200">

    <div class="div-input">
        <label class="textview">Nome</label>
        <input type="text" name="nome" class="input" required placeholder="Digite seu nome">
    </div>

    <div class="div-input">
        <label class="textview">Email</label>
        <input type="email" name="email" class="input" required placeholder="Digite seu email">
    </div>

    <div class="div-input">
        <label class="textview">Telefone</label>
        <input type="tel" name="telefone" class="input fone" inputmode="numeric"
            pattern="\([0-9]{2}\)\s?[0-9]{4,5}-[0-9]{4}" maxlength="15" required placeholder="(11) 99999-9999">
    </div>

    <div class="div-input">
        <label class="textview">Senha</label>
        <input type="password" name="senha" class="input" minlength="4" required placeholder="Digite sua senha">
    </div>

</form>
